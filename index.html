<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A13 — See the Whole Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
/* ─────────────────────────────────────────────────────────
   TOKENS
───────────────────────────────────────────────────────── */
:root {
  /* Core palette */
  --navy:        #0A2218;
  --navy-mid:    #0E2D1F;
  --harbor:      #0D9488;
  --ivory:       #F1F7F3;
  --charcoal:    #1A2A1E;

  /* Accent palette */
  --gold:        #22C55E;
  --gold-lt:     #4ADE80;
  --gold-dim:    rgba(34,197,94,.15);
  --cranberry:   #8A1E2D;
  --terracotta:  #B7603B;
  --pine:        #1F4A3C;

  /* Neutrals */
  --white:       #FFFFFF;
  --ink:         #1A2A1E;
  --ink-2:       #3D5246;
  --ink-3:       #7A9A87;
  --rule:        rgba(10,34,24,.1);

  /* Category colors */
  --cat-core:    #0A2218;
  --cat-virtual: #0D9488;
  --cat-opt:     #1F4A3C;

  /* Typography */
  --serif:       'Playfair Display', Georgia, serif;
  --sans:        'Inter', system-ui, sans-serif;
  --label:       'Montserrat', system-ui, sans-serif;
  --ease:        cubic-bezier(.25,.46,.45,.94);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--ivory);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─────────────────────────────────────────────────────────
   LOCK SCREEN
───────────────────────────────────────────────────────── */
#lock {
  display: flex;
  min-height: 100vh;
  background: var(--navy);
}

.lock-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 5rem;
  border-right: 1px solid rgba(201,162,74,.12);
  position: relative;
  overflow: hidden;
  background-image:
    linear-gradient(rgba(34,197,94,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,197,94,.05) 1px, transparent 1px);
  background-size: 52px 52px;
}

/* Radial glow */
.lock-left::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 35% 55%, rgba(13,148,136,.35) 0%, transparent 65%);
  pointer-events: none;
}

.lock-eyebrow {
  font-family: var(--label);
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .32em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 2.75rem;
  position: relative;
}

.lock-headline {
  font-family: var(--serif);
  font-weight: 400;
  font-style: italic;
  font-size: clamp(3.5rem, 6vw, 5.75rem);
  line-height: .92;
  color: var(--white);
  margin-bottom: 2.75rem;
  letter-spacing: -.015em;
  position: relative;
}

.lock-headline strong {
  font-style: normal;
  font-weight: 700;
  display: block;
  color: var(--white);
}

.lock-rule {
  width: 44px;
  height: 1px;
  background: var(--gold);
  opacity: .45;
  margin-bottom: 1.75rem;
  position: relative;
}

.lock-tagline {
  font-family: var(--serif);
  font-style: italic;
  font-size: 1rem;
  color: rgba(255,255,255,.45);
  margin-bottom: 3.25rem;
  line-height: 1.55;
  max-width: 340px;
  position: relative;
}

/* 13-move pip path */
.lock-path-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: .75rem;
}

.lock-pips {
  display: flex;
  align-items: center;
  gap: 13px;
  position: relative;
}

.lock-pips::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 1px;
  background: linear-gradient(90deg, rgba(34,197,94,.35) 0%, rgba(34,197,94,.1) 100%);
}

.pip {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(34,197,94,.38);
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  transition: background .2s;
}

.pip:last-child {
  background: var(--gold);
  width: 10px; height: 10px;
  box-shadow: 0 0 10px rgba(201,162,74,.55);
}

.lock-pip-label {
  font-family: var(--label);
  font-size: .5rem;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(255,255,255,.2);
}

/* Lock right — form panel */
.lock-right {
  width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 3.5rem;
  background: rgba(255,255,255,.022);
}

.lock-form-eyebrow {
  font-family: var(--label);
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 2.5rem;
  text-align: center;
}

.lock-field-wrap {
  width: 100%;
  position: relative;
  margin-bottom: .5rem;
}

.lock-field-label {
  display: block;
  font-family: var(--label);
  font-size: .55rem;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(255,255,255,.28);
  margin-bottom: .7rem;
}

.lock-field {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(201,162,74,.3);
  padding: .6rem 0;
  font-family: var(--sans);
  font-size: .95rem;
  color: var(--white);
  outline: none;
  letter-spacing: .1em;
  transition: border-color .25s var(--ease);
}

.lock-field:focus { border-bottom-color: var(--gold); }
.lock-field::placeholder { color: rgba(255,255,255,.16); letter-spacing: .06em; }

.lock-error {
  min-height: 1.4em;
  font-size: .7rem;
  color: #E07070;
  margin-top: .45rem;
  letter-spacing: .01em;
}

.lock-btn {
  width: 100%;
  margin-top: 2rem;
  background: var(--gold);
  color: var(--navy);
  border: none;
  padding: .9rem 1.5rem;
  font-family: var(--label);
  font-size: .62rem;
  font-weight: 700;
  letter-spacing: .3em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .2s var(--ease), transform .1s;
}

.lock-btn:hover  { background: var(--gold-lt); }
.lock-btn:active { transform: scale(.98); }

.lock-footnote {
  margin-top: 3rem;
  font-family: var(--label);
  font-size: .52rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(255,255,255,.16);
  text-align: center;
}

/* ─────────────────────────────────────────────────────────
   APP
───────────────────────────────────────────────────────── */
#app { display: none; flex-direction: column; min-height: 100vh; }

/* Subtle board grid on the page body */
#app::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(10,34,24,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,34,24,.028) 1px, transparent 1px);
  background-size: 52px 52px;
  pointer-events: none;
  z-index: 0;
}

/* Header */
.hdr {
  height: 62px;
  background: var(--white);
  border-bottom: 1px solid var(--rule);
  padding: 0 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
}

.hdr-brand {
  display: flex;
  flex-direction: column;
  gap: .1rem;
}

.hdr-monogram {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 1.15rem;
  color: var(--navy);
  letter-spacing: -.01em;
  line-height: 1;
}

.hdr-monogram em {
  font-style: italic;
  font-weight: 400;
  color: var(--gold);
}

.hdr-tagline {
  font-family: var(--label);
  font-size: .48rem;
  font-weight: 600;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--ink-3);
  line-height: 1;
}

.hdr-right { display: flex; align-items: center; gap: 1.25rem; }

.view-tog {
  display: flex;
  gap: .1rem;
  border: 1px solid var(--rule);
  border-radius: 2px;
  overflow: hidden;
}

.view-btn {
  background: none;
  border: none;
  padding: .36rem .85rem;
  font-family: var(--label);
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-3);
  cursor: pointer;
  transition: all .2s;
}

.view-btn.on {
  background: var(--navy);
  color: var(--white);
}

.view-btn:not(.on):hover { color: var(--ink); }

.signout-btn {
  background: none;
  border: none;
  font-family: var(--label);
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-3);
  cursor: pointer;
  padding: .36rem 0;
  border-bottom: 1px solid transparent;
  transition: color .2s, border-color .2s;
}

.signout-btn:hover { color: var(--ink); border-bottom-color: var(--rule); }

/* Sub-header */
.sub {
  background: var(--white);
  border-bottom: 1px solid var(--rule);
  padding: 0 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  min-height: 48px;
  flex-wrap: wrap;
  position: relative;
  z-index: 100;
}

.filters { display: flex; gap: 0; }

.filt-btn {
  background: none;
  border: none;
  font-family: var(--label);
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--ink-3);
  cursor: pointer;
  padding: .5rem .85rem;
  border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
  white-space: nowrap;
}

.filt-btn.on { color: var(--ink); border-bottom-color: var(--gold); }
.filt-btn:not(.on):hover { color: var(--ink-2); }

.mo-nav { display: flex; align-items: center; gap: .7rem; }

.mo-lbl {
  font-family: var(--serif);
  font-size: .95rem;
  font-weight: 500;
  color: var(--navy);
  min-width: 172px;
  text-align: center;
  letter-spacing: .01em;
}

.mo-btn {
  background: none;
  border: 1px solid var(--rule);
  border-radius: 2px;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--ink-2);
  font-size: 1rem;
  transition: all .2s;
  flex-shrink: 0;
}

.mo-btn:hover { background: var(--navy); color: var(--white); border-color: var(--navy); }

/* Main */
.main {
  flex: 1;
  padding: 2rem 2.5rem;
  max-width: 1300px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 1;
}

/* ─────────────────────────────────────────────────────────
   CALENDAR
───────────────────────────────────────────────────────── */
.cal-wrap {
  background: var(--white);
  border: 1px solid var(--rule);
}

.cal-head { display: grid; grid-template-columns: repeat(7, 1fr); }

.cal-wd {
  padding: .55rem .4rem;
  font-family: var(--label);
  font-size: .54rem;
  font-weight: 600;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--ink-3);
  text-align: center;
  border-bottom: 1px solid var(--rule);
}

.cal-body { display: grid; grid-template-columns: repeat(7, 1fr); }

.cal-cell {
  min-height: 108px;
  border-right: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: .5rem .45rem .4rem;
  position: relative;
}

.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell.dim { background: rgba(11,31,51,.018); }
.cal-cell.today { background: rgba(201,162,74,.04); }

.cal-dn {
  font-family: var(--sans);
  font-size: .7rem;
  font-weight: 400;
  color: var(--ink-3);
  display: inline-block;
  width: 22px; height: 22px;
  line-height: 22px;
  text-align: center;
  margin-bottom: .2rem;
}

.cal-cell.dim .cal-dn { opacity: .38; }

.cal-cell.today .cal-dn {
  background: var(--gold);
  color: var(--white);
  border-radius: 50%;
  font-weight: 600;
}

.cal-ev {
  display: block;
  font-family: var(--sans);
  font-size: .66rem;
  font-weight: 500;
  color: var(--white);
  padding: .15rem .3rem .15rem .35rem;
  margin-bottom: .18rem;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-left: 2px solid transparent;
  border-radius: 1px;
  transition: opacity .15s, filter .15s;
  line-height: 1.5;
}

.cal-ev:hover { opacity: .85; filter: brightness(1.08); }

/* Category color variants */
.cal-ev.ev-core     { background: var(--cat-core);    border-left-color: rgba(201,162,74,.5); }
.cal-ev.ev-virtual  { background: var(--cat-virtual); border-left-color: rgba(255,255,255,.25); }
.cal-ev.ev-optional { background: var(--cat-opt);     border-left-color: rgba(255,255,255,.25); }

/* Per-event accent override for border */
.cal-ev.accent-gold        { border-left-color: var(--gold); }
.cal-ev.accent-cranberry   { background: var(--cranberry); }
.cal-ev.accent-terracotta  { background: var(--terracotta); }
.cal-ev.accent-harbor      { background: var(--harbor); }
.cal-ev.accent-pine        { background: var(--pine); }

.cal-ev .cal-ev-move {
  opacity: .55;
  font-size: .58rem;
  margin-right: .2rem;
}

/* ─────────────────────────────────────────────────────────
   LIST VIEW
───────────────────────────────────────────────────────── */
.list-wrap { display: flex; flex-direction: column; }

.list-mo {
  display: flex;
  align-items: baseline;
  gap: 1.25rem;
  padding: 2rem 0 1rem;
  border-bottom: 1px solid var(--rule);
  margin-bottom: .25rem;
}

.list-mo:first-child { padding-top: 0; }

.list-mo-name {
  font-family: var(--serif);
  font-size: 1.4rem;
  font-weight: 400;
  color: var(--navy);
  letter-spacing: .01em;
  white-space: nowrap;
}

.list-mo-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--gold) 0%, transparent 100%);
  opacity: .25;
  margin-bottom: 3px;
}

.list-ev {
  display: flex;
  gap: 0;
  align-items: stretch;
  padding: 1.25rem 0;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background .2s;
  border-radius: 1px;
}

.list-ev:hover { background: rgba(201,162,74,.04); }
.list-ev:last-child { border-bottom: none; }

.list-date {
  width: 72px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-right: 1.25rem;
  border-right: 1px solid var(--rule);
  margin-right: 1.5rem;
}

.list-dd {
  font-family: var(--serif);
  font-size: 2.4rem;
  font-weight: 400;
  line-height: 1;
  color: var(--navy);
}

.list-dm {
  font-family: var(--label);
  font-size: .52rem;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-top: .2rem;
}

.list-range {
  font-family: var(--serif);
  font-size: .88rem;
  font-weight: 400;
  color: var(--navy);
  line-height: 1.35;
  text-align: center;
}

.list-body { flex: 1; min-width: 0; }

.list-move-row {
  display: flex;
  align-items: center;
  gap: .6rem;
  margin-bottom: .4rem;
}

.list-move {
  font-family: var(--label);
  font-size: .52rem;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--white);
  padding: .14rem .45rem;
  border-radius: 2px;
  flex-shrink: 0;
}

.list-move.ev-core     { background: var(--cat-core); }
.list-move.ev-virtual  { background: var(--cat-virtual); }
.list-move.ev-optional { background: var(--cat-opt); }
.list-move.accent-cranberry  { background: var(--cranberry); }
.list-move.accent-terracotta { background: var(--terracotta); }

.list-cat {
  font-family: var(--label);
  font-size: .52rem;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-3);
}

.list-title {
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.3rem;
  font-weight: 400;
  color: var(--navy);
  line-height: 1.25;
  margin-bottom: .28rem;
}

.list-subtitle {
  font-family: var(--sans);
  font-size: .78rem;
  font-weight: 400;
  color: var(--ink-2);
  margin-bottom: .5rem;
  line-height: 1.4;
}

.list-meta {
  display: flex;
  flex-wrap: wrap;
  gap: .3rem 1.25rem;
  font-size: .72rem;
  color: var(--ink-2);
}

.list-meta-item { display: flex; align-items: center; gap: .35rem; }

.list-meta-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--gold);
  opacity: .6;
  flex-shrink: 0;
}

.empty {
  text-align: center;
  padding: 5rem 2rem;
}

.empty-t {
  font-family: var(--serif);
  font-size: 1.75rem;
  font-weight: 400;
  font-style: italic;
  color: var(--navy);
  margin-bottom: .5rem;
}

.empty-s { font-size: .8rem; color: var(--ink-3); }

/* ─────────────────────────────────────────────────────────
   MODAL
───────────────────────────────────────────────────────── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(8,18,32,.7);
  z-index: 900;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.overlay.show {
  display: flex;
  animation: fadeIn .28s var(--ease) forwards;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--white);
  max-width: 600px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp .3s var(--ease) forwards;
  border: 1px solid var(--rule);
}

@keyframes slideUp {
  from { transform: translateY(14px) scale(.97); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}

.modal-hdr {
  padding: 2rem 2.25rem 1.75rem;
  position: relative;
  transition: background .25s;
}

.modal-move {
  font-family: var(--label);
  font-size: .54rem;
  font-weight: 700;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: rgba(255,255,255,.55);
  margin-bottom: .55rem;
}

.modal-tag {
  font-family: var(--label);
  font-size: .54rem;
  font-weight: 600;
  letter-spacing: .26em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: .6rem;
}

.modal-title {
  font-family: var(--serif);
  font-weight: 400;
  font-style: italic;
  font-size: 2rem;
  color: var(--white);
  line-height: 1.15;
  padding-right: 2.5rem;
}

.modal-subtitle {
  font-family: var(--sans);
  font-size: .82rem;
  font-weight: 400;
  color: rgba(255,255,255,.5);
  margin-top: .55rem;
  line-height: 1.4;
  padding-right: 2.5rem;
}

.modal-x {
  position: absolute;
  top: 1.25rem;
  right: 1.25rem;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  color: rgba(255,255,255,.5);
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: .9rem;
  transition: all .2s;
}

.modal-x:hover { background: rgba(255,255,255,.16); color: var(--white); }

.modal-body { padding: 1.75rem 2.25rem; }

.modal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 1.5rem;
}

.modal-lbl {
  font-family: var(--label);
  font-size: .52rem;
  font-weight: 600;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: .3rem;
}

.modal-val {
  font-size: .88rem;
  color: var(--ink);
  line-height: 1.4;
}

.modal-val em { font-style: normal; color: var(--gold); font-weight: 500; }

.modal-desc-wrap {
  margin-bottom: 1.75rem;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 1.5rem;
}

.modal-desc {
  font-size: .875rem;
  line-height: 1.8;
  color: var(--ink-2);
}

.modal-desc p + p { margin-top: .75rem; }

/* ───────────────────────────────────────────────────────────
   STATE
─────────────────────────────────────────────────────────── */
const PW = "atlantic13";
let view   = "cal";
let filter = "all";
let calY   = 2026;
let calM   = 7;  // Aug 2026

const MO_L = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MO_S = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WD   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

/* ───────────────────────────────────────────────────────────
   LOCK PIPS
─────────────────────────────────────────────────────────── */
(function buildPips() {
  const wrap = document.getElementById("lockPips");
  if (!wrap) return;
  for (let i = 0; i < 13; i++) {
    const d = document.createElement("div");
    d.className = "pip";
    wrap.appendChild(d);
  }
})();

/* ───────────────────────────────────────────────────────────
   AUTH
─────────────────────────────────────────────────────────── */
function tryLogin() {
  const val = document.getElementById("pw").value;
  if (val === PW) {
    document.getElementById("lock").style.display = "none";
    const a = document.getElementById("app");
    a.style.display = "flex";
    a.style.flexDirection = "column";
    render();
  } else {
    document.getElementById("lockErr").textContent = "Incorrect password. Please try again.";
    document.getElementById("pw").value = "";
    document.getElementById("pw").focus();
  }
}

document.getElementById("pw").addEventListener("keydown", e => {
  document.getElementById("lockErr").textContent = "";
  if (e.key === "Enter") tryLogin();
});

function signOut() {
  document.getElementById("app").style.display = "none";
  document.getElementById("lock").style.display = "flex";
  document.getElementById("pw").value = "";
  document.getElementById("lockErr").textContent = "";
}

/* ───────────────────────────────────────────────────────────
   FILTER
─────────────────────────────────────────────────────────── */
function filtered() {
  if (filter === "all") return EVT;
  return EVT.filter(e => e.cat === filter);
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll(".filt-btn").forEach(b => b.classList.toggle("on", b.dataset.f === f));
  render();
}

/* ───────────────────────────────────────────────────────────
   VIEW
─────────────────────────────────────────────────────────── */
function setView(v) {
  view = v;
  document.getElementById("btnCal").classList.toggle("on",  v === "cal");
  document.getElementById("btnList").classList.toggle("on", v === "list");
  document.getElementById("calView").style.display   = v === "cal"  ? "block" : "none";
  document.getElementById("listView").style.display  = v === "list" ? "block" : "none";
  document.getElementById("moNav").style.display     = v === "cal"  ? "flex"  : "none";
  render();
}

/* ───────────────────────────────────────────────────────────
   CALENDAR
─────────────────────────────────────────────────────────── */
function stepMo(d) {
  calM += d;
  if (calM < 0)  { calM = 11; calY--; }
  if (calM > 11) { calM = 0;  calY++; }
  renderCal();
}

function catClass(cat) {
  if (cat === "core")     return "ev-core";
  if (cat === "virtual")  return "ev-virtual";
  if (cat === "optional") return "ev-optional";
  return "ev-core";
}

function renderCal() {
  const evts  = filtered();
  const today = new Date(); today.setHours(0,0,0,0);
  document.getElementById("moLbl").textContent = `${MO_L[calM]} ${calY}`;

  const startDow  = new Date(calY, calM, 1).getDay();
  const daysInMo  = new Date(calY, calM + 1, 0).getDate();
  const prevTotal = new Date(calY, calM, 0).getDate();
  const cellCount = Math.ceil((startDow + daysInMo) / 7) * 7;

  let html = `<div class="cal-wrap">
    <div class="cal-head">${WD.map(d => `<div class="cal-wd">${d}</div>`).join("")}</div>
    <div class="cal-body">`;

  for (let i = 0; i < cellCount; i++) {
    let d, m = calM, y = calY, dim = false;
    if (i < startDow) {
      d = prevTotal - startDow + i + 1; m = calM - 1; if (m < 0) { m = 11; y--; } dim = true;
    } else if (i >= startDow + daysInMo) {
      d = i - startDow - daysInMo + 1; m = calM + 1; if (m > 11) { m = 0; y++; } dim = true;
    } else {
      d = i - startDow + 1;
    }
    const cell = new Date(y, m, d); cell.setHours(0,0,0,0);
    const isTd = cell.getTime() === today.getTime();

    const chips = evts.filter(ev => {
      const s = pDate(ev.start), e = pDate(ev.end);
      return ev.mOnly ? cell.getTime() === s.getTime() : (cell >= s && cell <= e);
    });

    html += `<div class="cal-cell${dim ? " dim" : ""}${isTd ? " today" : ""}">
      <span class="cal-dn">${d}</span>
      ${chips.map(ev => {
        const cls = `cal-ev ${catClass(ev.cat)}${ev.accent ? " " + ev.accent : ""}`;
        return `<span class="${cls}" onclick="openModal(${ev.id})"><span class="cal-ev-move">${ev.move}</span>${ev.title.replace(/&amp;/g,'&')}</span>`;
      }).join("")}
    </div>`;
  }
  html += `</div></div>`;
  document.getElementById("calView").innerHTML = html;
}

/* ───────────────────────────────────────────────────────────
   LIST
─────────────────────────────────────────────────────────── */
function renderList() {
  const evts = filtered().slice().sort((a, b) => a.start.localeCompare(b.start));

  if (!evts.length) {
    document.getElementById("listView").innerHTML =
      `<div class="empty"><div class="empty-t">No events</div><div class="empty-s">Try a different filter.</div></div>`;
    return;
  }

  const groups = {};
  evts.forEach(ev => {
    const d   = pDate(ev.start);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const lbl = `${MO_L[d.getMonth()]} ${d.getFullYear()}`;
    if (!groups[key]) groups[key] = { lbl, evts: [] };
    groups[key].evts.push(ev);
  });

  let html = '<div class="list-wrap">';
  Object.keys(groups).sort().forEach(key => {
    const g = groups[key];
    html += `<div class="list-mo">
      <div class="list-mo-name">${g.lbl}</div>
      <div class="list-mo-line"></div>
    </div>`;
    g.evts.forEach(ev => {
      const d    = pDate(ev.start);
      const isR  = ev.start !== ev.end;
      const dateFrag = (isR || ev.mOnly)
        ? `<div class="list-range">${ev.label}</div>`
        : `<div class="list-dd">${d.getDate()}</div><div class="list-dm">${MO_S[d.getMonth()]}</div>`;

      const moveCls = `list-move ${catClass(ev.cat)}${ev.accent === "accent-cranberry" ? " accent-cranberry" : ev.accent === "accent-terracotta" ? " accent-terracotta" : ""}`;

      html += `<div class="list-ev" onclick="openModal(${ev.id})">
        <div class="list-date">${dateFrag}</div>
        <div class="list-body">
          <div class="list-move-row">
            <span class="${moveCls}">Move ${ev.move}</span>
            <span class="list-cat">${ev.catLabel}</span>
          </div>
          <div class="list-title">${ev.title.replace(/&amp;/g,'&')}</div>
          ${ev.subtitle ? `<div class="list-subtitle">${ev.subtitle}</div>` : ''}
          <div class="list-meta">
            <span class="list-meta-item">
              <span class="list-meta-dot"></span>
              ${ev.loc}
            </span>
            <span class="list-meta-item">
              <span class="list-meta-dot"></span>
              Chair: ${ev.chair.replace(/&amp;/g,'&')}
            </span>
          </div>
        </div>
      </div>`;
    });
  });
  html += "</div>";
  document.getElementById("listView").innerHTML = html;
}

/* ───────────────────────────────────────────────────────────
   MODAL
─────────────────────────────────────────────────────────── */
function openModal(id) {
  const ev = EVT.find(e => e.id === id);
  if (!ev) return;

  document.getElementById("mMove").textContent    = `Move ${ev.move}`;
  document.getElementById("mTag").textContent     = `${ev.catLabel}  ·  ${cap(ev.type)}`;
  document.getElementById("mTitle").innerHTML     = ev.title;
  document.getElementById("mSubtitle").textContent = ev.subtitle || "";
  document.getElementById("mDate").textContent    = ev.label;
  document.getElementById("mLoc").textContent     = ev.loc;
  document.getElementById("mChair").innerHTML     = ev.chair;
  document.getElementById("mCat").textContent     = ev.catLabel;

  // Accent background on modal header
  document.getElementById("modalHdr").style.background = ev.accentBg || "#0B1F33";

  const dw = document.getElementById("mDescWrap");
  const dd = document.getElementById("mDesc");
  if (ev.desc) {
    dd.innerHTML = ev.desc;
    dw.style.display = "block";
  } else {
    dd.innerHTML = "";
    dw.style.display = "none";
  }

  // Google Calendar link
  const s  = ev.start.replace(/-/g, "");
  const en = nextDay(ev.end).replace(/-/g, "");
  const plainDesc = ev.desc
    ? ev.desc.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").replace(/&amp;/g,"&").trim()
    : `YPO Atlantic 13 — ${ev.catLabel}. Chair: ${ev.chair.replace(/&amp;/g,"&")}`;
  document.getElementById("mGcal").href =
    `https://calendar.google.com/calendar/render?action=TEMPLATE` +
    `&text=${enc(ev.title.replace(/&amp;/g,"&"))}` +
    `&dates=${s}/${en}` +
    `&location=${enc(ev.loc)}` +
    `&details=${enc(plainDesc)}`;

  const ov = document.getElementById("overlay");
  ov.classList.add("show");
  document.body.style.overflow = "hidden";

  const m = document.getElementById("modal");
  m.style.animation = "none";
  void m.offsetHeight;
  m.style.animation = "";
}

function closeModal() {
  document.getElementById("overlay").classList.remove("show");
  document.body.style.overflow = "";
}

function bgClose(e) {
  if (e.target === document.getElementById("overlay")) closeModal();
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

/* ───────────────────────────────────────────────────────────
   UTILS
─────────────────────────────────────────────────────────── */
function pDate(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function nextDay(s) {
  const d = pDate(s); d.setDate(d.getDate() + 1);
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,"0"), String(d.getDate()).padStart(2,"0")].join("-");
}
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function enc(s) { return encodeURIComponent(s); }

function render() {
  if (view === "cal")  renderCal();
  else                 renderList();
}
</script>
