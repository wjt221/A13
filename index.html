<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A13 — See the Whole Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
/* ─────────────────────────────────────────────────────────
   TOKENS
───────────────────────────────────────────────────────── */
:root {
  --navy:        #0A2218;
  --navy-mid:    #0E2D1F;
  --harbor:      #0D9488;
  --ivory:       #F1F7F3;
  --charcoal:    #1A2A1E;
  --gold:        #22C55E;
  --gold-lt:     #4ADE80;
  --gold-dim:    rgba(34,197,94,.15);
  --cranberry:   #8A1E2D;
  --terracotta:  #B7603B;
  --pine:        #1F4A3C;
  --white:       #FFFFFF;
  --ink:         #1A2A1E;
  --ink-2:       #3D5246;
  --ink-3:       #7A9A87;
  --rule:        rgba(10,34,24,.1);
  --cat-core:    #0A2218;
  --cat-virtual: #0D9488;
  --cat-opt:     #1F4A3C;
  --serif:       'Playfair Display', Georgia, serif;
  --sans:        'Inter', system-ui, sans-serif;
  --label:       'Montserrat', system-ui, sans-serif;
  --ease:        cubic-bezier(.25,.46,.45,.94);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--ivory);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─────────────────────────────────────────────────────────
   LOCK SCREEN
───────────────────────────────────────────────────────── */
#lock {
  display: flex;
  min-height: 100vh;
  background: var(--navy);
}

.lock-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 5rem;
  border-right: 1px solid rgba(34,197,94,.1);
  position: relative;
  overflow: hidden;
  background-image:
    linear-gradient(rgba(34,197,94,.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,197,94,.045) 1px, transparent 1px);
  background-size: 52px 52px;
}

.lock-left::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 35% 55%, rgba(13,148,136,.35) 0%, transparent 65%);
  pointer-events: none;
}

.lock-eyebrow {
  font-family: var(--label);
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .32em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 2.75rem;
  position: relative;
}

.lock-headline {
  font-family: var(--serif);
  font-weight: 400;
  font-style: italic;
  font-size: clamp(3.5rem, 6vw, 5.75rem);
  line-height: .92;
  color: var(--white);
  margin-bottom: 2.75rem;
  letter-spacing: -.015em;
  position: relative;
}

.lock-headline strong {
  font-style: normal;
  font-weight: 700;
  display: block;
  color: var(--white);
}

.lock-rule {
  width: 44px;
  height: 1px;
  background: var(--gold);
  opacity: .45;
  margin-bottom: 1.75rem;
  position: relative;
}

.lock-tagline {
  font-family: var(--serif);
  font-style: italic;
  font-size: 1rem;
  color: rgba(255,255,255,.45);
  margin-bottom: 3.25rem;
  line-height: 1.55;
  max-width: 340px;
  position: relative;
}

.lock-path-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: .75rem;
}

.lock-pips {
  display: flex;
  align-items: center;
  gap: 13px;
  position: relative;
}

.lock-pips::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 1px;
  background: linear-gradient(90deg, rgba(34,197,94,.35) 0%, rgba(34,197,94,.1) 100%);
}

.pip {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(34,197,94,.38);
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

.pip:last-child {
  background: var(--gold);
  width: 10px; height: 10px;
  box-shadow: 0 0 10px rgba(34,197,94,.55);
}

.lock-pip-label {
  font-family: var(--label);
  font-size: .5rem;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(255,255,255,.2);
}

.lock-right {
  width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4rem 3.5rem;
  background: rgba(255,255,255,.022);
}

.lock-form-eyebrow {
  font-family: var(--label);
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 2.5rem;
  text-align: center;
}

.lock-field-wrap { width: 100%; position: relative; margin-bottom: .5rem; }

.lock-field-label {
  display: block;
  font-family: var(--label);
  font-size: .55rem;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(255,255,255,.28);
  margin-bottom: .7rem;
}

.lock-field {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(34,197,94,.3);
  padding: .6rem 0;
  font-family: var(--sans);
  font-size: .95rem;
  color: var(--white);
  outline: none;
  letter-spacing: .1em;
  transition: border-color .25s var(--ease);
}

.lock-field:focus { border-bottom-color: var(--gold); }
.lock-field::placeholder { color: rgba(255,255,255,.16); letter-spacing: .06em; }

.lock-error {
  min-height: 1.4em;
  font-size: .7rem;
  color: #E07070;
  margin-top: .45rem;
  letter-spacing: .01em;
}

.lock-btn {
  width: 100%;
  margin-top: 2rem;
  background: var(--gold);
  color: var(--navy);
  border: none;
  padding: .9rem 1.5rem;
  font-family: var(--label);
  font-size: .62rem;
  font-weight: 700;
  letter-spacing: .3em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .2s var(--ease), transform .1s;
}

.lock-btn:hover  { background: var(--gold-lt); }
.lock-btn:active { transform: scale(.98); }

.lock-footnote {
  margin-top: 3rem;
  font-family: var(--label);
  font-size: .52rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(255,255,255,.16);
  text-align: center;
}

/* ─────────────────────────────────────────────────────────
   APP
───────────────────────────────────────────────────────── */
#app { display: none; flex-direction: column; min-height: 100vh; }

/* Subtle board grid */
#app::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(10,34,24,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,34,24,.028) 1px, transparent 1px);
  background-size: 52px 52px;
  pointer-events: none;
  z-index: 0;
}

/* ─── Header ─── */
.hdr {
  height: 62px;
  background: var(--white);
  border-bottom: 1px solid var(--rule);
  padding: 0 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
}

.hdr-brand { display: flex; flex-direction: column; gap: .1rem; }

.hdr-monogram {
  font-family: var(--serif);
  font-weight: 700;
  font-size: 1.15rem;
  color: var(--navy);
  letter-spacing: -.01em;
  line-height: 1;
}

.hdr-monogram em { font-style: italic; font-weight: 400; color: var(--gold); }

.hdr-tagline {
  font-family: var(--label);
  font-size: .48rem;
  font-weight: 600;
  letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--ink-3);
  line-height: 1;
}

.signout-btn {
  background: none;
  border: none;
  font-family: var(--label);
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-3);
  cursor: pointer;
  padding: .36rem 0;
  border-bottom: 1px solid transparent;
  transition: color .2s, border-color .2s;
}

.signout-btn:hover { color: var(--ink); border-bottom-color: var(--rule); }

/* ─── Main ─── */
.main {
  flex: 1;
  padding: 2.5rem;
  max-width: 1080px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 1;
}

/* ─────────────────────────────────────────────────────────
   EVENT CARDS
───────────────────────────────────────────────────────── */
.ev-list { display: flex; flex-direction: column; }

.ev-month {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  padding: 2.25rem 0 .85rem;
}

.ev-month:first-child { padding-top: 0; }

.ev-month-name {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 400;
  font-style: italic;
  color: var(--navy);
  white-space: nowrap;
}

.ev-month-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--gold) 0%, transparent 100%);
  opacity: .2;
}

/* Card — base */
.ev-card {
  display: flex;
  background: var(--white);
  border: 1px solid var(--rule);
  border-left-width: 4px;
  border-left-style: solid;
  overflow: hidden;
  cursor: pointer;
  margin-bottom: 1.25rem;
  transition: transform .35s var(--ease), box-shadow .35s var(--ease);
}

.ev-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 18px 52px rgba(10,34,24,.1);
}

/* Core — large, navy */
.ev-card--core { border-left-color: #0A2218; }
.ev-card--core .ev-photo { width: 44%; min-height: 300px; }
.ev-card--core .ev-title { font-size: 1.85rem; }
.ev-card--core .ev-content { padding: 2.25rem 2.5rem; background: var(--white); }

/* Optional — medium, terracotta/warm */
.ev-card--optional { border-left-color: #B7603B; }
.ev-card--optional .ev-photo { width: 34%; min-height: 195px; }
.ev-card--optional .ev-title { font-size: 1.35rem; }
.ev-card--optional .ev-content { padding: 1.5rem 1.75rem; background: #FDF8F3; }
.ev-card--optional .ev-info-dot { background: #B7603B; }

/* Virtual — compact, teal */
.ev-card--virtual { border-left-color: #0D9488; }
.ev-card--virtual .ev-photo { width: 28%; min-height: 160px; }
.ev-card--virtual .ev-title { font-size: 1.25rem; }
.ev-card--virtual .ev-content { padding: 1.25rem 1.5rem; background: #F0FAF8; }
.ev-card--virtual .ev-info-dot { background: #0D9488; }
.ev-card--virtual .ev-subtitle { margin-bottom: 1rem; }

/* Photo side — shared */
.ev-photo {
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  background: var(--navy);
}

.ev-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform .55s var(--ease);
}

.ev-card:hover .ev-photo img { transform: scale(1.05); }

/* Photo fallback gradient (shown if image fails) */
.ev-photo-fallback {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ev-photo-num {
  font-family: var(--serif);
  font-style: italic;
  font-size: 5rem;
  font-weight: 300;
  color: rgba(255,255,255,.15);
  line-height: 1;
}

/* Category strip at bottom of photo */
.ev-photo-cat {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: .5rem .7rem;
  font-family: var(--label);
  font-size: .5rem;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: rgba(255,255,255,.7);
  background: linear-gradient(transparent, rgba(0,0,0,.4));
}


/* Content side */
.ev-content {
  flex: 1;
  padding: 2.25rem 2.5rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-width: 0;
}

.ev-meta-row {
  display: flex;
  align-items: center;
  gap: .65rem;
  margin-bottom: .85rem;
}

.ev-num {
  font-family: var(--label);
  font-size: .5rem;
  font-weight: 700;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--white);
  padding: .15rem .5rem;
  border-radius: 1px;
  flex-shrink: 0;
}

.ev-cat-lbl {
  font-family: var(--label);
  font-size: .5rem;
  font-weight: 500;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: var(--ink-3);
}

.ev-title {
  font-family: var(--serif);
  font-style: italic;
  font-size: 1.85rem;
  font-weight: 400;
  color: var(--navy);
  line-height: 1.1;
  margin-bottom: .4rem;
}

.ev-subtitle {
  font-family: var(--sans);
  font-size: .82rem;
  font-weight: 400;
  color: var(--ink-2);
  line-height: 1.45;
  margin-bottom: 1.5rem;
}

.ev-info {
  display: flex;
  flex-wrap: wrap;
  gap: .3rem 1.5rem;
  font-size: .74rem;
  color: var(--ink-2);
  border-top: 1px solid var(--rule);
  padding-top: 1.1rem;
}

.ev-info-item { display: flex; align-items: center; gap: .4rem; }

.ev-info-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--gold);
  opacity: .7;
  flex-shrink: 0;
}

/* ─────────────────────────────────────────────────────────
   MODAL
───────────────────────────────────────────────────────── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(8,18,12,.72);
  z-index: 900;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.overlay.show {
  display: flex;
  animation: fadeIn .28s var(--ease) forwards;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--white);
  max-width: 600px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp .3s var(--ease) forwards;
  border: 1px solid var(--rule);
}

@keyframes slideUp {
  from { transform: translateY(14px) scale(.97); opacity: 0; }
  to   { transform: translateY(0) scale(1); opacity: 1; }
}

.modal-hdr {
  padding: 2rem 2.25rem 1.75rem;
  position: relative;
}

.modal-move {
  font-family: var(--label);
  font-size: .54rem;
  font-weight: 700;
  letter-spacing: .3em;
  text-transform: uppercase;
  color: rgba(255,255,255,.5);
  margin-bottom: .55rem;
}

.modal-tag {
  font-family: var(--label);
  font-size: .54rem;
  font-weight: 600;
  letter-spacing: .26em;
  text-transform: uppercase;
  color: rgba(255,255,255,.6);
  margin-bottom: .6rem;
}

.modal-title {
  font-family: var(--serif);
  font-weight: 400;
  font-style: italic;
  font-size: 2rem;
  color: var(--white);
  line-height: 1.15;
  padding-right: 2.5rem;
}

.modal-subtitle {
  font-family: var(--sans);
  font-size: .82rem;
  color: rgba(255,255,255,.5);
  margin-top: .55rem;
  line-height: 1.4;
  padding-right: 2.5rem;
}

.modal-x {
  position: absolute;
  top: 1.25rem;
  right: 1.25rem;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  color: rgba(255,255,255,.5);
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: .9rem;
  transition: all .2s;
}

.modal-x:hover { background: rgba(255,255,255,.16); color: var(--white); }

.modal-body { padding: 1.75rem 2.25rem; }

.modal-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 1.5rem;
}

.modal-lbl {
  font-family: var(--label);
  font-size: .52rem;
  font-weight: 600;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: .3rem;
}

.modal-val { font-size: .88rem; color: var(--ink); line-height: 1.4; }

.modal-desc-wrap {
  margin-bottom: 1.75rem;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 1.5rem;
}

.modal-desc { font-size: .875rem; line-height: 1.8; color: var(--ink-2); }
.modal-desc p + p { margin-top: .75rem; }
.modal-desc h4 {
  font-family: var(--serif);
  font-size: 1rem;
  font-weight: 600;
  color: var(--navy);
  margin: 1.1rem 0 .4rem;
}
.modal-desc ul { padding-left: 1.1rem; }
.modal-desc li { margin-bottom: .3rem; }
.modal-desc strong { color: var(--ink); font-weight: 500; }
.modal-desc em { font-style: italic; color: var(--ink-2); }

.gcal-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .6rem;
  width: 100%;
  background: var(--gold);
  color: var(--navy);
  text-decoration: none;
  padding: .9rem 1.5rem;
  font-family: var(--label);
  font-size: .6rem;
  font-weight: 700;
  letter-spacing: .24em;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  transition: background .2s var(--ease), transform .1s;
}

.gcal-btn:hover  { background: var(--gold-lt); }
.gcal-btn:active { transform: scale(.99); }
.gcal-icon { flex-shrink: 0; }

/* ─────────────────────────────────────────────────────────
   RESPONSIVE
───────────────────────────────────────────────────────── */
@media (max-width: 820px) {
  .lock-left { display: none; }
  .lock-right { width: 100%; max-width: 420px; margin: auto; }
  #lock { justify-content: center; }
}

@media (max-width: 700px) {
  .ev-card { flex-direction: column; }
  .ev-photo { width: 100%; min-height: 220px; }
  .ev-content { padding: 1.5rem; }
  .ev-title { font-size: 1.5rem; }
}

@media (max-width: 640px) {
  .hdr { padding: 0 1.25rem; }
  .main { padding: 1.25rem; }
  .modal { max-height: 95vh; }
  .modal-title { font-size: 1.5rem; }
  .modal-grid { grid-template-columns: 1fr; gap: .85rem; }
  .modal-hdr { padding: 1.5rem 1.5rem 1.25rem; }
  .modal-body { padding: 1.25rem 1.5rem; }
}

/* Scrollbar */
.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-track { background: transparent; }
.modal::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ══ LOCK ═══════════════════════════════════════════════ -->
<div id="lock">
  <div class="lock-left">
    <img src="assets/YPO_US_Atlantic13White-01.png" alt="YPO US Atlantic 13" style="width:200px;margin-bottom:2.5rem;opacity:.92;position:relative;">
    <div class="lock-headline">
      See the<br><strong>Whole Board</strong>
    </div>
    <div class="lock-rule"></div>
    <p class="lock-tagline">Thirteen events. One unforgettable year.<br>A chapter for leaders who play the long game.</p>
    <div class="lock-path-wrap">
      <div class="lock-pips" id="lockPips"></div>
      <div class="lock-pip-label">13 events &nbsp;·&nbsp; FY 2026–2027</div>
    </div>
  </div>

  <div class="lock-right">
    <div class="lock-form-eyebrow">Member Access</div>
    <div style="width:100%">
      <label class="lock-field-label" for="pw">Chapter Password</label>
      <div class="lock-field-wrap">
        <input class="lock-field" type="password" id="pw" placeholder="••••••••••" autocomplete="off">
      </div>
      <div class="lock-error" id="lockErr" role="alert"></div>
      <button class="lock-btn" onclick="tryLogin()">Enter</button>
    </div>
    <p class="lock-footnote">View only &nbsp;·&nbsp; Members only</p>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════ -->
<div id="app">
  <header class="hdr">
    <div class="hdr-brand">
      <img src="assets/YPO_US_Atlantic13Black-01.png" alt="YPO US Atlantic 13" style="height:36px;width:auto;display:block;">
    </div>
    <button class="signout-btn" onclick="signOut()">Sign Out</button>
  </header>

  <main class="main">
    <div id="evList"></div>
  </main>
</div>

<!-- ══ MODAL ══════════════════════════════════════════════ -->
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal" id="modal">
    <div class="modal-hdr" id="modalHdr">
      <div class="modal-move"  id="mMove"></div>
      <div class="modal-tag"   id="mTag"></div>
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-subtitle" id="mSubtitle"></div>
      <button class="modal-x" onclick="closeModal()" aria-label="Close">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="modal-grid">

/* ───────────────────────────────────────────────────────────
   STATE
─────────────────────────────────────────────────────────── */
const PW = "atlantic13";

const MO_L = ["January","February","March","April","May","June",
              "July","August","September","October","November","December"];
const MO_S = ["Jan","Feb","Mar","Apr","May","Jun",
              "Jul","Aug","Sep","Oct","Nov","Dec"];

/* ───────────────────────────────────────────────────────────
   LOCK PIPS
─────────────────────────────────────────────────────────── */
(function buildPips() {
  const wrap = document.getElementById("lockPips");
  if (!wrap) return;
  for (let i = 0; i < 13; i++) {
    const d = document.createElement("div");
    d.className = "pip";
    wrap.appendChild(d);
  }
})();


function handleImgError(img, bg) {
  img.style.display = "none";
  img.parentElement.style.background =
    "linear-gradient(160deg, " + bg + " 0%, " + bg + "99 100%)";
}

/* ───────────────────────────────────────────────────────────
   AUTH
─────────────────────────────────────────────────────────── */
function tryLogin() {
  const val = document.getElementById("pw").value;
  if (val === PW) {
    document.getElementById("lock").style.display = "none";
    const a = document.getElementById("app");
    a.style.display    = "flex";
    a.style.flexDirection = "column";
    renderList();
  } else {
    document.getElementById("lockErr").textContent = "Incorrect password. Please try again.";
    document.getElementById("pw").value = "";
    document.getElementById("pw").focus();
  }
}

document.getElementById("pw").addEventListener("keydown", e => {
  document.getElementById("lockErr").textContent = "";
  if (e.key === "Enter") tryLogin();
});

function signOut() {
  document.getElementById("app").style.display  = "none";
  document.getElementById("lock").style.display = "flex";
  document.getElementById("pw").value = "";
  document.getElementById("lockErr").textContent = "";
}

/* ───────────────────────────────────────────────────────────
   CATEGORY HELPERS
─────────────────────────────────────────────────────────── */
function catBg(cat) {
  if (cat === "virtual")  return "#0D9488";
  if (cat === "optional") return "#B7603B";
  return "#0A2218";
}

/* ───────────────────────────────────────────────────────────
   RENDER
─────────────────────────────────────────────────────────── */
function renderList() {
  const evts = EVT.slice().sort((a, b) => a.start.localeCompare(b.start));

  // Group by month
  const groups = {};
  evts.forEach(ev => {
    const d   = pDate(ev.start);
    const key = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
    const lbl = MO_L[d.getMonth()] + " " + d.getFullYear();
    if (!groups[key]) groups[key] = { lbl, evts: [] };
    groups[key].evts.push(ev);
  });

  let html = '<div class="ev-list">';

  Object.keys(groups).sort().forEach(key => {
    const g = groups[key];
    html += `<div class="ev-month">
      <div class="ev-month-name">${g.lbl}</div>
      <div class="ev-month-line"></div>
    </div>`;

    g.evts.forEach(ev => {
      const numBg = catBg(ev.cat);

      html += `
      <div class="ev-card ev-card--${ev.cat}" onclick="openModal(${ev.id})">

        <div class="ev-photo" style="background:${ev.accentBg}">
          <img
            src="${ev.defaultPhoto}"
            alt="${ev.title.replace(/&amp;/g,'&')}"
            loading="lazy"
            onerror="handleImgError(this,'${ev.accentBg}')"
          >
          <div class="ev-photo-fallback">
            <span class="ev-photo-num">${ev.move}</span>
          </div>
          <div class="ev-photo-cat">${ev.catLabel}</div>
        </div>

        <div class="ev-content">
          <div class="ev-meta-row">
            <span class="ev-num" style="background:${numBg}">Event ${ev.move}</span>
            <span class="ev-cat-lbl">${ev.catLabel}</span>
          </div>
          <div class="ev-title">${ev.title.replace(/&amp;/g,'&')}</div>
          ${ev.subtitle ? `<div class="ev-subtitle">${ev.subtitle}</div>` : ''}
          <div class="ev-info">
            <span class="ev-info-item">
              <span class="ev-info-dot"></span>
              ${ev.label}
            </span>
            <span class="ev-info-item">
              <span class="ev-info-dot"></span>
              ${ev.loc}
            </span>
            <span class="ev-info-item">
              <span class="ev-info-dot"></span>
              Chair: ${ev.chair.replace(/&amp;/g,'&')}
            </span>
          </div>
        </div>

      </div>`;
    });
  });

  html += "</div>";
  document.getElementById("evList").innerHTML = html;
}

/* ───────────────────────────────────────────────────────────
   MODAL
─────────────────────────────────────────────────────────── */
function openModal(id) {
  const ev = EVT.find(e => e.id === id);
  if (!ev) return;

  document.getElementById("mMove").textContent     = "Event " + ev.move;
  document.getElementById("mTag").textContent      = ev.catLabel + "  ·  " + cap(ev.type);
  document.getElementById("mTitle").innerHTML      = ev.title;
  document.getElementById("mSubtitle").textContent = ev.subtitle || "";
  document.getElementById("mDate").textContent     = ev.label;
  document.getElementById("mLoc").textContent      = ev.loc;
  document.getElementById("mChair").innerHTML      = ev.chair;
  document.getElementById("mCat").textContent      = ev.catLabel;

  document.getElementById("modalHdr").style.background = ev.accentBg || "#0A2218";

  const dw = document.getElementById("mDescWrap");
  const dd = document.getElementById("mDesc");
  if (ev.desc) {
    dd.innerHTML = ev.desc;
    dw.style.display = "block";
  } else {
    dd.innerHTML = "";
    dw.style.display = "none";
  }

  const s  = ev.start.replace(/-/g, "");
  const en = nextDay(ev.end).replace(/-/g, "");
  const plainDesc = ev.desc
    ? ev.desc.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").replace(/&amp;/g,"&").trim()
    : "YPO Atlantic 13 — " + ev.catLabel + ". Chair: " + ev.chair.replace(/&amp;/g,"&");

  document.getElementById("mGcal").href =
    "https://calendar.google.com/calendar/render?action=TEMPLATE" +
    "&text="     + enc(ev.title.replace(/&amp;/g,"&")) +
    "&dates="    + s + "/" + en +
    "&location=" + enc(ev.loc) +
    "&details="  + enc(plainDesc);

  const ov = document.getElementById("overlay");
  ov.classList.add("show");
  document.body.style.overflow = "hidden";

  const m = document.getElementById("modal");
  m.style.animation = "none";
  void m.offsetHeight;
  m.style.animation = "";
}

function closeModal() {
  document.getElementById("overlay").classList.remove("show");
  document.body.style.overflow = "";
}

function bgClose(e) {
  if (e.target === document.getElementById("overlay")) closeModal();
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

/* ───────────────────────────────────────────────────────────
   UTILS
─────────────────────────────────────────────────────────── */
function pDate(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function nextDay(s) {
  const d = pDate(s); d.setDate(d.getDate() + 1);
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,"0"), String(d.getDate()).padStart(2,"0")].join("-");
}
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function enc(s) { return encodeURIComponent(s); }
